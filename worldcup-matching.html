<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>世界杯连连看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    .header {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }
    .header h1 {
      font-size: 28px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    .hud {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0,0,0,0.4);
      margin: 10px;
      border-radius: 12px;
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .hud-value { font-size: 20px; font-weight: bold; color: #ffd700; }
    .game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    #matchGrid {
      display: grid;
      gap: 5px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 12px;
      border: 2px solid rgba(255,215,0,0.3);
    }
    .match-cell {
      width: 50px;
      height: 50px;
      background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 28px;
      border: 1px solid rgba(255,215,0,0.2);
      position: relative;
    }
    .match-cell:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px rgba(255,215,0,0.4);
    }
    .match-cell.selected {
      background: linear-gradient(145deg, #3a3a5a, #2a2a4a);
      box-shadow: 0 0 20px rgba(255,215,0,0.6);
      border-color: #ffd700;
    }
    .match-cell.matched {
      background: rgba(255,215,0,0.2);
      animation: matchPulse 0.4s ease;
    }
    .match-cell.shake {
      animation: shake 0.3s ease;
    }
    .match-cell.empty {
      background: transparent;
      border: none;
      pointer-events: none;
    }
    .match-cell.hint-active {
      animation: hintPulse 0.5s ease infinite alternate;
    }
    @keyframes matchPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    @keyframes hintPulse {
      0% { box-shadow: 0 0 5px rgba(255,215,0,0.5); }
      100% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
    }
    .tools {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
    }
    .tool-btn {
      padding: 10px 20px;
      background: rgba(255,215,0,0.2);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 8px;
      color: #ffd700;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tool-btn:hover {
      background: rgba(255,215,0,0.3);
    }
    .progress-bar {
      width: 80%;
      max-width: 400px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      transition: width 0.3s;
    }
    #lineCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .screen.hidden { display: none; }
    .screen h2 {
      font-size: 32px;
      color: #ffd700;
      margin-bottom: 20px;
    }
    .screen p {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 30px;
    }
    .start-btn {
      padding: 15px 40px;
      font-size: 18px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      border-radius: 12px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .start-btn:hover { transform: scale(1.05); }
    .result-screen h2 { font-size: 28px; }
    .result-screen .stats {
      display: flex;
      gap: 30px;
      margin: 20px 0;
    }
    .result-screen .stat {
      text-align: center;
    }
    .result-screen .stat-value {
      font-size: 24px;
      color: #ffd700;
      font-weight: bold;
    }
    .result-screen .stat-label {
      font-size: 12px;
      color: #888;
    }
    .result-btn {
      padding: 12px 30px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .result-btn.primary {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a2e;
      font-weight: bold;
    }
    .result-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="lineCanvas"></canvas>
  
  <div id="startScreen" class="screen">
    <h1>🏆 世界杯连连看 🏆</h1>
    <p>找出相同的国旗并连接它们<br>规则：只能拐弯2次以内</p>
    <button class="start-btn" onclick="startGame()">开始挑战</button>
  </div>
  
  <div id="gameScreen" class="screen hidden">
    <div class="header">
      <h1>⚽ 世界杯连连看 ⚽</h1>
    </div>
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">关卡</div>
        <div class="hud-value" id="levelDisplay">第1关</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">剩余</div>
        <div class="hud-value" id="hintDisplay">0对</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">时间</div>
        <div class="hud-value" id="timeDisplay">90</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="game-container">
      <div id="matchGrid"></div>
    </div>
    <div class="tools">
      <button class="tool-btn" onclick="showHint()">💡 提示</button>
      <button class="tool-btn" onclick="shuffleGrid()">🔀 洗牌</button>
    </div>
  </div>
  
  <div id="resultScreen" class="screen result-screen hidden">
    <h2 id="resultTitle">通关成功！</h2>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="statTime">0s</div>
        <div class="stat-label">用时</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statMatches">0</div>
        <div class="stat-label">配对数</div>
      </div>
    </div>
    <button class="result-btn primary" onclick="nextLevel()">下一关 →</button>
    <button class="result-btn secondary" onclick="backToStart()">返回主页</button>
  </div>

<script>
// ============ 关卡配置 ============
const LEVELS = [
  { rows: 4, cols: 6, name: '小组赛A组', time: 90 },
  { rows: 4, cols: 6, name: '小组赛B组', time: 80 },
  { rows: 5, cols: 6, name: '小组赛C组', time: 75 },
  { rows: 5, cols: 6, name: '小组赛D组', time: 70 },
  { rows: 5, cols: 8, name: '16强淘汰赛', time: 65 },
  { rows: 6, cols: 8, name: '8强淘汰赛', time: 60 },
  { rows: 6, cols: 10, name: '半决赛', time: 55 },
  { rows: 7, cols: 10, name: '决赛', time: 50 },
];

// 世界杯参赛国国旗
const TEAM_LOGOS = [
  '🇧🇷', '🇦🇷', '🇫🇷', '🇩🇪', '🇪🇸', '🇵🇹', '🇬🇧', '🇮🇹',
  '🇳🇱', '🇧🇪', '🇭🇷', '🇩🇰', '🇵🇱', '🇨🇭', '🇦🇹', '🇺🇾',
  '🇲🇽', '🇺🇸', '🇨🇦', '🇯🇵', '🇰🇷', '🇮🇷', '🇸🇦', '🇦🇺',
  '🇸🇳', '🇲🇦', '🇪🇬', '🇬🇭', '🇵🇰', '🇮🇳', '🇮🇩', '🇹🇭'
];

// ============ 游戏状态 ============
let currentLevel = 0;
let grid = [];
let selected = null;
let matchCount = 0;
let startTime = 0;
let timeLeft = 90;
let timerInterval = null;
let totalPairs = 0;
let remainingPairs = 0;
let hintCells = [];
let hintTimeout = null;
let lineCanvas, lineCtx;

// ============ 初始化 ============
function init() {
  lineCanvas = document.getElementById('lineCanvas');
  lineCtx = lineCanvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  lineCanvas.width = window.innerWidth;
  lineCanvas.height = window.innerHeight;
}

// ============ 游戏流程 ============
function startGame() {
  currentLevel = 0;
  matchCount = 0;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  initLevel();
}

function initLevel() {
  const config = LEVELS[currentLevel];
  
  document.getElementById('levelDisplay').textContent = `第${currentLevel + 1}关`;
  document.getElementById('hintDisplay').textContent = `${remainingPairs}对`;
  timeLeft = config.time;
  document.getElementById('timeDisplay').textContent = timeLeft;
  
  generateGrid(config.rows, config.cols);
  totalPairs = grid.length / 2;
  remainingPairs = totalPairs;
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timeDisplay').textContent = timeLeft;
    if (timeLeft <= 0) failLevel();
  }, 1000);
  
  startTime = Date.now();
  renderGrid();
  updateProgress();
}

function generateGrid(rows, cols) {
  grid = [];
  const total = rows * cols;
  const pairs = total / 2;
  
  // 创建配对
  let logos = [];
  for (let i = 0; i < pairs; i++) {
    const logo = TEAM_LOGOS[i % TEAM_LOGOS.length];
    logos.push(logo, logo);
  }
  
  // 打乱顺序
  logos.sort(() => Math.random() - 0.5);
  
  // 填充网格
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      grid.push({
        row: i,
        col: j,
        logo: logos[i * cols + j],
        matched: false,
        empty: false
      });
    }
  }
}

function renderGrid() {
  const container = document.getElementById('matchGrid');
  const config = LEVELS[currentLevel];
  
  container.style.gridTemplateColumns = `repeat(${config.cols}, 50px)`;
  container.innerHTML = '';
  
  grid.forEach((cell, idx) => {
    const el = document.createElement('div');
    el.className = 'match-cell' + (cell.empty ? ' empty' : '');
    el.dataset.idx = idx;
    
    if (!cell.empty) {
      el.innerHTML = `<div class="logo">${cell.logo}</div>`;
      el.onclick = () => selectCell(idx);
    }
    
    container.appendChild(el);
  });
  
  updateProgress();
}

// ============ 选择与连接 ============
function selectCell(idx) {
  if (timerInterval === null) return;
  
  const cell = grid[idx];
  if (cell.empty || cell.matched) return;
  
  const cellEl = document.querySelector(`.match-cell[data-idx="${idx}"]`);
  
  if (selected === null) {
    selected = idx;
    cellEl.classList.add('selected');
    clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => showHint(), 3000);
  } else if (selected === idx) {
    selected = null;
    cellEl.classList.remove('selected');
    clearTimeout(hintTimeout);
  } else {
    const firstCell = grid[selected];
    const secondCell = cell;
    
    if (firstCell.logo === secondCell.logo) {
      const path = findPath(selected, idx);
      console.log('findPath returned:', path);
      if (path) {
        // 匹配成功
        const firstEl = document.querySelector(`.match-cell[data-idx="${selected}"]`);
        drawPath(path);
        
        setTimeout(() => {
          firstCell.matched = true;
          secondCell.matched = true;
          firstCell.empty = true;
          secondCell.empty = true;
          
          firstEl.classList.remove('selected');
          firstEl.classList.add('matched');
          cellEl.classList.add('matched');
          
          setTimeout(() => {
            firstEl.classList.add('empty');
            firstEl.innerHTML = '';
            cellEl.classList.add('empty');
            cellEl.innerHTML = '';
          }, 400);
          
          matchCount++;
          remainingPairs--;
          document.getElementById('hintDisplay').textContent = `${remainingPairs}对`;
          updateProgress();
          
          if (remainingPairs === 0) successLevel();
        }, 200);
      } else {
        // 图案相同但路径不通
        cellEl.classList.add('shake');
        const firstEl = document.querySelector(`.match-cell[data-idx="${selected}"]`);
        firstEl.classList.add('shake');
        setTimeout(() => {
          cellEl.classList.remove('shake');
          firstEl.classList.remove('shake');
        }, 300);
      }
    } else {
      // 图案不同
      cellEl.classList.add('shake');
      const firstEl = document.querySelector(`.match-cell[data-idx="${selected}"]`);
      firstEl.classList.add('shake');
      setTimeout(() => {
        cellEl.classList.remove('shake');
        firstEl.classList.remove('shake');
      }, 300);
    }
    
    selected = null;
    const selEl = document.querySelector(`.match-cell[data-idx="${selected}"]`);
    clearLine();
  }
}

// ============ 路径查找 (最多2个转弯) ============
function findPath(idx1, idx2) {
  const config = LEVELS[currentLevel];
  const rows = config.rows;
  const cols = config.cols;
  
  const cell1 = grid[idx1];
  const cell2 = grid[idx2];
  
  if (cell1.logo !== cell2.logo) return null;
  
  // 扩展网格坐标（原网格从1,1开始，边界外也可用）
  const r1 = cell1.row + 1;
  const c1 = cell1.col + 1;
  const r2 = cell2.row + 1;
  const c2 = cell2.col + 1;
  
  // 检查是否在边界外空白区域
  const isEmpty = (r, c) => {
    if (r < 0 || r > rows + 1 || c < 0 || c > cols + 1) return false;
    if (r === 0 || r === rows + 1 || c === 0 || c === cols + 1) return true;
    return grid[(r - 1) * cols + (c - 1)].empty;
  };
  
  // 检查两点间直线是否通畅（不包括端点）
  const lineClear = (r1, c1, r2, c2) => {
    if (r1 === r2 && c1 === c2) return true;
    if (r1 === r2) {
      const minC = Math.min(c1, c2);
      const maxC = Math.max(c1, c2);
      for (let c = minC + 1; c < maxC; c++) {
        if (!isEmpty(r1, c)) return false;
      }
      return true;
    }
    if (c1 === c2) {
      const minR = Math.min(r1, r2);
      const maxR = Math.max(r1, r2);
      for (let r = minR + 1; r < maxR; r++) {
        if (!isEmpty(r, c1)) return false;
      }
      return true;
    }
    return false;
  };
  
  // 1. 直接连接（0转弯）
  if (lineClear(r1, c1, r2, c2)) {
    return [[r1, c1], [r2, c2]];
  }
  
  // 2. 一个转弯
  // 拐角1: (r1, c2)
  if (isEmpty(r1, c2) && lineClear(r1, c1, r1, c2) && lineClear(r1, c2, r2, c2)) {
    return [[r1, c1], [r1, c2], [r2, c2]];
  }
  // 拐角2: (r2, c1)
  if (isEmpty(r2, c1) && lineClear(r1, c1, r2, c1) && lineClear(r2, c1, r2, c2)) {
    return [[r1, c1], [r2, c1], [r2, c2]];
  }
  
  // 3. 两个转弯 - 水平→竖直→水平
  for (let c = 0; c <= cols + 1; c++) {
    if (c === c1 || c === c2) continue;
    if (isEmpty(r1, c) && lineClear(r1, c1, r1, c) && isEmpty(r2, c) && lineClear(r2, c2, r2, c) && lineClear(r1, c, r2, c)) {
      return [[r1, c1], [r1, c], [r2, c], [r2, c2]];
    }
  }
  
  // 4. 两个转弯 - 竖直→水平→竖直
  for (let r = 0; r <= rows + 1; r++) {
    if (r === r1 || r === r2) continue;
    if (isEmpty(r, c1) && lineClear(r1, c1, r, c1) && isEmpty(r, c2) && lineClear(r2, c2, r, c2) && lineClear(r, c1, r, c2)) {
      return [[r1, c1], [r, c1], [r, c2], [r2, c2]];
    }
  }
  
  return null;
}

// ============ 画连接线 ============
function drawPath(path) {
  if (!path || path.length < 2) return;
  
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  
  const container = document.getElementById('matchGrid');
  const rect = container.getBoundingClientRect();
  const config = LEVELS[currentLevel];
  const cellSize = 50;
  const gap = 5;
  
  // 计算网格起始位置
  const totalWidth = config.cols * cellSize + (config.cols - 1) * gap;
  const totalHeight = config.rows * cellSize + (config.rows - 1) * gap;
  const startX = rect.left + (rect.width - totalWidth) / 2;
  const startY = rect.top + (rect.height - totalHeight) / 2;
  
  // 转换扩展网格坐标到屏幕坐标
  const toScreen = (r, c) => {
    const gridX = startX + (c - 1) * (cellSize + gap) + cellSize / 2;
    const gridY = startY + (r - 1) * (cellSize + gap) + cellSize / 2;
    return [gridX, gridY];
  };
  
  lineCtx.beginPath();
  const [sx, sy] = toScreen(path[0][0], path[0][1]);
  lineCtx.moveTo(sx, sy);
  
  for (let i = 1; i < path.length; i++) {
    const [ex, ey] = toScreen(path[i][0], path[i][1]);
    lineCtx.lineTo(ex, ey);
  }
  
  lineCtx.strokeStyle = '#ffd700';
  lineCtx.lineWidth = 4;
  lineCtx.lineCap = 'round';
  lineCtx.lineJoin = 'round';
  lineCtx.shadowColor = '#ffd700';
  lineCtx.shadowBlur = 15;
  lineCtx.stroke();
  
  setTimeout(() => lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height), 400);
}

function clearLine() {
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
}

function updateProgress() {
  const progress = ((totalPairs - remainingPairs) / totalPairs) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
}

function showHint() {
  const unmatched = grid.filter(c => !c.empty && !c.matched);
  
  for (let i = 0; i < unmatched.length; i++) {
    for (let j = i + 1; j < unmatched.length; j++) {
      if (unmatched[i].logo === unmatched[j].logo) {
        const idx1 = grid.indexOf(unmatched[i]);
        const idx2 = grid.indexOf(unmatched[j]);
        
        const cell1 = document.querySelector(`.match-cell[data-idx="${idx1}"]`);
        const cell2 = document.querySelector(`.match-cell[data-idx="${idx2}"]`);
        
        cell1.classList.add('hint-active');
        cell2.classList.add('hint-active');
        hintCells = [idx1, idx2];
        
        setTimeout(() => {
          cell1.classList.remove('hint-active');
          cell2.classList.remove('hint-active');
        }, 2000);
        
        return;
      }
    }
  }
}

function shuffleGrid() {
  const config = LEVELS[currentLevel];
  const unmatched = grid.filter(c => !c.empty && !c.matched);
  const logos = unmatched.map(c => c.logo);
  
  logos.sort(() => Math.random() - 0.5);
  
  unmatched.forEach((cell, i) => {
    cell.logo = logos[i];
  });
  
  renderGrid();
  
  // 清除提示
  if (hintCells.length > 0) {
    hintCells.forEach(idx => {
      const el = document.querySelector(`.match-cell[data-idx="${idx}"]`);
      if (el) el.classList.remove('hint-active');
    });
    hintCells = [];
  }
}

function successLevel() {
  clearInterval(timerInterval);
  timerInterval = null;
  
  const timeUsed = Math.round((Date.now() - startTime) / 1000);
  
  document.getElementById('resultTitle').textContent = '🎉 通关成功！';
  document.getElementById('statTime').textContent = timeUsed + 's';
  document.getElementById('statMatches').textContent = matchCount;
  document.getElementById('resultScreen').classList.remove('hidden');
}

function failLevel() {
  clearInterval(timerInterval);
  timerInterval = null;
  
  document.getElementById('resultTitle').textContent = '⏱️ 时间到！';
  document.getElementById('statTime').textContent = '-';
  document.getElementById('statMatches').textContent = matchCount;
  document.getElementById('resultScreen').classList.remove('hidden');
}

function nextLevel() {
  document.getElementById('resultScreen').classList.add('hidden');
  currentLevel++;
  if (currentLevel >= LEVELS.length) currentLevel = 0;
  initLevel();
}

function backToStart() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  clearInterval(timerInterval);
  timerInterval = null;
}

init();
</script>
</body>
</html>
