<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界杯连连看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      color: #ffd700;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .info {
      display: flex;
      gap: 30px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .info span { color: #aaa; }
    .info strong { color: #ffd700; }
    #grid {
      display: grid;
      gap: 4px;
      background: rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: 10px;
    }
    .cell {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      border: 1px solid rgba(255,215,0,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cell:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,215,0,0.4);
    }
    .cell.selected {
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255,215,0,0.6);
    }
    .cell.empty {
      background: transparent;
      border: none;
      pointer-events: none;
    }
    .cell.matched {
      animation: pulse 0.3s ease;
    }
    .cell.shake {
      animation: shake 0.3s ease;
    }
    @keyframes pulse {
      50% { transform: scale(1.15); }
    }
    @keyframes shake {
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .tools {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      background: rgba(255,215,0,0.2);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 6px;
      color: #ffd700;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: rgba(255,215,0,0.3); }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <h1>🏆 世界杯连连看</h1>
  <div class="info">
    <span>关卡: <strong id="level">1</strong></span>
    <span>剩余: <strong id="pairs">12</strong> 对</span>
    <span>时间: <strong id="time">90</strong> 秒</span>
  </div>
  <div id="grid"></div>
  <div class="tools">
    <button onclick="showHint()">💡 提示</button>
    <button onclick="shuffle()">🔀 洗牌</button>
  </div>
  <canvas id="canvas"></canvas>

<script>
// ============ 配置 ============
const LEVELS = [
  { rows: 4, cols: 6, time: 90 },
  { rows: 4, cols: 6, time: 80 },
  { rows: 5, cols: 6, time: 75 },
  { rows: 5, cols: 8, time: 70 },
];

const FLAGS = '🇧🇷🇦🇷🇫🇷🇩🇪🇪🇸🇵🇹🇬🇧🇮🇹🇳🇱🇧🇪🇭🇷🇩🇰🇵🇱🇨🇭🇦🇹🇺🇾🇲🇽🇺🇸🇨🇦🇯🇵🇰🇷🇮🇷🇸🇦🇦🇺'.split('');

// ============ 状态 ============
let level = 0;
let grid = [];
let selected = null;
let pairs = 0;
let timer = null;
let timeLeft = 90;
let canvas, ctx;

// ============ 初始化 ============
function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
  startLevel();
}

function startLevel() {
  clearInterval(timer);
  const config = LEVELS[level];
  const rows = config.rows;
  const cols = config.cols;
  
  document.getElementById('level').textContent = level + 1;
  timeLeft = config.time;
  document.getElementById('time').textContent = timeLeft;
  
  // 生成网格
  grid = [];
  const total = rows * cols;
  const numPairs = total / 2;
  let logos = [];
  
  for (let i = 0; i < numPairs; i++) {
    const flag = FLAGS[i % FLAGS.length];
    logos.push(flag, flag);
  }
  
  // 打乱
  for (let i = logos.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [logos[i], logos[j]] = [logos[j], logos[i]];
  }
  
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      grid.push({
        row: i, col: j,
        logo: logos[i * cols + j],
        empty: false
      });
    }
  }
  
  pairs = numPairs;
  document.getElementById('pairs').textContent = pairs;
  
  render();
  
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('time').textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      alert('时间到！');
      startLevel();
    }
  }, 1000);
}

function render() {
  const config = LEVELS[level];
  const rows = config.rows;
  const cols = config.cols;
  const container = document.getElementById('grid');
  
  container.style.gridTemplateColumns = `repeat(${cols}, 48px)`;
  container.innerHTML = '';
  
  grid.forEach((cell, idx) => {
    const div = document.createElement('div');
    div.className = 'cell' + (cell.empty ? ' empty' : '');
    div.dataset.idx = idx;
    if (!cell.empty) {
      div.textContent = cell.logo;
      div.onclick = () => handleClick(idx);
    }
    container.appendChild(div);
  });
}

function handleClick(idx) {
  const cell = grid[idx];
  if (cell.empty) return;
  
  const cellEl = document.querySelector(`[data-idx="${idx}"]`);
  
  if (selected === null) {
    selected = idx;
    cellEl.classList.add('selected');
  } else if (selected === idx) {
    selected = null;
    cellEl.classList.remove('selected');
  } else {
    const first = grid[selected];
    const second = cell;
    
    if (first.logo === second.logo) {
      // 图案相同，检查能否连接
      const path = canConnect(selected, idx);
      if (path) {
        // 能连接！画线并消除
        drawLine(path);
        setTimeout(() => {
          first.empty = true;
          second.empty = true;
          pairs--;
          document.getElementById('pairs').textContent = pairs;
          
          document.querySelector(`[data-idx="${selected}"]`).classList.remove('selected');
          document.querySelector(`[data-idx="${selected}"]`).classList.add('empty');
          document.querySelector(`[data-idx="${selected}"]`).textContent = '';
          cellEl.classList.add('empty');
          cellEl.textContent = '';
          
          clearLine();
          selected = null;
          
          if (pairs === 0) {
            clearInterval(timer);
            setTimeout(() => {
              alert('恭喜通关！');
              level = (level + 1) % LEVELS.length;
              startLevel();
            }, 300);
          }
        }, 300);
      } else {
        // 不能连接，抖动
        cellEl.classList.add('shake');
        document.querySelector(`[data-idx="${selected}"]`).classList.add('shake');
        setTimeout(() => {
          cellEl.classList.remove('shake');
          document.querySelector(`[data-idx="${selected}"]`).classList.remove('shake');
        }, 300);
        selected = null;
        document.querySelector(`[data-idx="${selected}"]`).classList.remove('selected');
      }
    } else {
      // 图案不同
      cellEl.classList.add('shake');
      document.querySelector(`[data-idx="${selected}"]`).classList.add('shake');
      setTimeout(() => {
        cellEl.classList.remove('shake');
        document.querySelector(`[data-idx="${selected}"]`).classList.remove('shake');
      }, 300);
      selected = null;
      document.querySelector(`[data-idx="${selected}"]`).classList.remove('selected');
    }
  }
}

// ============ 路径判断 (最多2个转弯) ============
// 判断两个格子能否连接，最多2个转弯
function canConnect(idx1, idx2) {
  const config = LEVELS[level];
  const rows = config.rows;
  const cols = config.cols;
  
  const c1 = grid[idx1];
  const c2 = grid[idx2];
  
  if (c1.logo !== c2.logo) return null;
  
  // 扩展网格坐标 (边界外也可行走)
  // 原网格从 (1,1) 到 (rows, cols)
  // 扩展后从 (0,0) 到 (rows+1, cols+1)
  const r1 = c1.row + 1;
  const rc1 = c1.col + 1;
  const r2 = c2.row + 1;
  const rc2 = c2.col + 1;
  
  // 判断位置是否为空
  const isEmpty = (r, c) => {
    if (r < 0 || r > rows + 1 || c < 0 || c > cols + 1) return false;
    // 边界外总是空的
    if (r === 0 || r === rows + 1 || c === 0 || c === cols + 1) return true;
    // 边界内检查格子
    return grid[(r - 1) * cols + (c - 1)].empty;
  };
  
  // 直线是否通畅（不包括端点）
  const lineClear = (r1, c1, r2, c2) => {
    if (r1 === r2 && c1 === c2) return true;
    if (r1 === r2) {
      const min = Math.min(c1, c2);
      const max = Math.max(c1, c2);
      for (let c = min + 1; c < max; c++) {
        if (!isEmpty(r1, c)) return false;
      }
      return true;
    }
    if (c1 === c2) {
      const min = Math.min(r1, r2);
      const max = Math.max(r1, r2);
      for (let r = min + 1; r < max; r++) {
        if (!isEmpty(r, c1)) return false;
      }
      return true;
    }
    return false;
  };
  
  // 1. 直接连接 (同行或同列，中间无阻)
  if (lineClear(r1, rc1, r2, rc2)) {
    return [[r1, rc1], [r2, rc2]];
  }
  
  // 2. 一个转弯
  // 拐角点1: (r1, rc2)
  if (isEmpty(r1, rc2) && lineClear(r1, rc1, r1, rc2) && lineClear(r1, rc2, r2, rc2)) {
    return [[r1, rc1], [r1, rc2], [r2, rc2]];
  }
  // 拐角点2: (r2, rc1)
  if (isEmpty(r2, rc1) && lineClear(r1, rc1, r2, rc1) && lineClear(r2, rc1, r2, rc2)) {
    return [[r1, rc1], [r2, rc1], [r2, rc2]];
  }
  
  // 3. 两个转弯 - 走整行或整列
  // 水平方向走到底再竖直
  for (let c = 0; c <= cols + 1; c++) {
    if (c === rc1 || c === rc2) continue;
    if (isEmpty(r1, c) && lineClear(r1, rc1, r1, c) && isEmpty(r2, c) && lineClear(r2, rc2, r2, c) && lineClear(r1, c, r2, c)) {
      return [[r1, rc1], [r1, c], [r2, c], [r2, rc2]];
    }
  }
  
  // 竖直方向走到底再水平
  for (let r = 0; r <= rows + 1; r++) {
    if (r === r1 || r === r2) continue;
    if (isEmpty(r, rc1) && lineClear(r1, rc1, r, rc1) && isEmpty(r, rc2) && lineClear(r2, rc2, r, rc2) && lineClear(r, rc1, r, rc2)) {
      return [[r1, rc1], [r, rc1], [r, rc2], [r2, rc2]];
    }
  }
  
  return null;
}

// ============ 画线 ============
function drawLine(path) {
  if (!path || path.length < 2) return;
  
  const gridEl = document.getElementById('grid');
  const rect = gridEl.getBoundingClientRect();
  const config = LEVELS[level];
  const cellSize = 48;
  const gap = 4;
  const padding = 8;
  
  const totalW = config.cols * cellSize + (config.cols - 1) * gap;
  const totalH = config.rows * cellSize + (config.rows - 1) * gap;
  const startX = rect.left + (rect.width - totalW) / 2;
  const startY = rect.top + (rect.height - totalH) / 2;
  
  const toXY = (r, c) => [
    startX + (c - 1) * (cellSize + gap) + cellSize / 2,
    startY + (r - 1) * (cellSize + gap) + cellSize / 2
  ];
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  const [x1, y1] = toXY(path[0][0], path[0][1]);
  ctx.moveTo(x1, y1);
  for (let i = 1; i < path.length; i++) {
    const [x, y] = toXY(path[i][0], path[i][1]);
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;
  ctx.stroke();
}

function clearLine() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ============ 提示 ============
function showHint() {
  for (let i = 0; i < grid.length; i++) {
    if (grid[i].empty) continue;
    for (let j = i + 1; j < grid.length; j++) {
      if (grid[j].empty) continue;
      if (grid[i].logo === grid[j].logo && canConnect(i, j)) {
        document.querySelector(`[data-idx="${i}"]`).classList.add('selected');
        document.querySelector(`[data-idx="${j}"]`).classList.add('selected');
        setTimeout(() => {
          document.querySelector(`[data-idx="${i}"]`).classList.remove('selected');
          document.querySelector(`[data-idx="${j}"]`).classList.remove('selected');
        }, 1500);
        return;
      }
    }
  }
}

function shuffle() {
  const cells = grid.filter(c => !c.empty);
  const logos = cells.map(c => c.logo);
  for (let i = logos.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [logos[i], logos[j]] = [logos[j], logos[i]];
  }
  cells.forEach((c, i) => c.logo = logos[i]);
  render();
}

init();
</script>
</body>
</html>
